name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    env:
      DO_NOT_TRACK: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "26"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # --- jsx-string ----------------------------------------------------
      - name: Type check jsx-string
        run: bun run check
        working-directory: packages/jsx-string
      - name: Test jsx-string
        run: bun test
        working-directory: packages/jsx-string
      - name: Build jsx-string
        run: bun run build
        working-directory: packages/jsx-string
      - name: Verify jsx-string artifacts
        run: |
          test -f dist/index.js || exit 1
          test -f dist/index.d.ts || exit 1
        working-directory: packages/jsx-string

      # --- eslint-plugin-jsx-string --------------------------------------
      - name: Type check eslint-plugin
        run: bun run check
        working-directory: packages/eslint-plugin-jsx-string
      - name: Test eslint-plugin
        run: bun test
        working-directory: packages/eslint-plugin-jsx-string
      - name: Build eslint-plugin
        run: bun run build
        working-directory: packages/eslint-plugin-jsx-string
      - name: Verify eslint-plugin artifacts
        run: |
          test -f dist/index.js || exit 1
          test -f dist/index.d.ts || exit 1
        working-directory: packages/eslint-plugin-jsx-string

      # --- i18n-tiny -----------------------------------------------------
      - name: Type check i18n-tiny
        run: bun run check
        working-directory: packages/i18n-tiny
      - name: Test i18n-tiny
        run: bun test
        working-directory: packages/i18n-tiny
      - name: Build i18n-tiny
        run: bun run build
        working-directory: packages/i18n-tiny
      - name: Verify i18n-tiny artifacts
        run: |
          test -f dist/index.js || exit 1
          test -f dist/index.d.ts || exit 1
        working-directory: packages/i18n-tiny

      # --- jsx-flow ------------------------------------------------------
      - name: Type check jsx-flow
        run: bun run check
        working-directory: packages/jsx-flow
      - name: Test jsx-flow
        run: bun test
        working-directory: packages/jsx-flow
      - name: Build jsx-flow
        run: bun run build
        working-directory: packages/jsx-flow
      - name: Verify jsx-flow artifacts
        run: |
          test -f dist/index.js || exit 1
          test -f dist/index.d.ts || exit 1
        working-directory: packages/jsx-flow

      # --- jsx-vite ------------------------------------------------------
      - name: Type check jsx-vite
        run: bun run check
        working-directory: packages/jsx-vite
      - name: Test jsx-vite
        run: bun test
        working-directory: packages/jsx-vite
      - name: Build jsx-vite
        run: bun run build
        working-directory: packages/jsx-vite
      - name: Verify jsx-vite artifacts
        run: |
          test -f dist/index.js || exit 1
          test -f dist/index.d.ts || exit 1
        working-directory: packages/jsx-vite

      # --- jsonresume-theme-cjean ---------------------------------------
      - name: Type check jsonresume-theme-cjean
        run: bun run check
        working-directory: packages/jsonresume-theme-cjean
      - name: Lint jsonresume-theme-cjean
        run: bun run lint
        working-directory: packages/jsonresume-theme-cjean
      - name: Build jsonresume-theme-cjean
        run: bun run build
        working-directory: packages/jsonresume-theme-cjean
      - name: Verify jsonresume-theme-cjean artifacts
        run: |
          test -f dist/index.js || exit 1
          test -f dist/index.cjs || exit 1
          test -f dist/index.d.ts || exit 1
        working-directory: packages/jsonresume-theme-cjean

      # --- jsx-string-doc -----------------------------------------------
      - name: Build jsx-string-doc
        run: bun run build
        working-directory: apps/jsx-string-doc
      - name: Verify jsx-string-doc artifacts
        run: |
          test -f dist/index.html || exit 1
          test -f dist/search-index.json || exit 1
          test -f dist/guide/installation.html || exit 1
          test -f dist/jsx-flow/overview.html || exit 1
        working-directory: apps/jsx-string-doc
